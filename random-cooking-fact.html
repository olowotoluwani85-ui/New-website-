<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Fun Cooking Fact</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top left, #ffdc73 0%, transparent 40%),
                  radial-gradient(circle at bottom right, #ff6b92 0%, transparent 35%),
                  linear-gradient(135deg, #fff1d6 0%, #ffd3b6 40%, #ff9a8b 100%);
      color: #2d2d2d;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      overflow: hidden;
    }

    .card {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
      max-width: 520px;
      width: 100%;
      padding: 34px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.7);
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
      color: #d65a31;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.7;
      margin: 24px 0;
    }

    button {
      background: #ff8b42;
      border: none;
      border-radius: 999px;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      padding: 14px 24px;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    button:hover {
      background: #ff7130;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Random Fun Cooking Fact</h1>
    <p id="fact">Press the button to see a tasty trivia fact!</p>
    <button id="factButton" type="button">Show me a cooking fact</button>
  </div>

  <script>
    const facts = [
      "The first cookbook written by a woman was published in 1691 and includes recipes for fish, meat, and even a sponge cake.",
      "Tomatoes were once considered poisonous in Europe because they belong to the nightshade family.",
      "In Japan, there is a dish called \"sushi\" that originally meant \"sour rice\" and was invented to preserve fish.",
      "Spices such as cinnamon, nutmeg, and cloves were once worth more than gold during the Middle Ages.",
      "Carrots were originally purple, white, and yellow — orange carrots were bred in the 17th century.",
      "The world’s most expensive spice is saffron, because it takes about 150,000 flowers to make one pound.",
      "The modern sandwich is named after the 4th Earl of Sandwich, who asked for meat between bread so he could play cards without using utensils.",
      "Honey is the only natural food that never spoils; archaeologists have found edible honey in ancient Egyptian tombs.",
      "Popcorn has been around for thousands of years and was enjoyed by ancient people in the Americas.",
      "The so-called \"French\" in French fries refers to the cutting style, not necessarily the country of origin."
    ];

    const factElement = document.getElementById('fact');
    const button = document.getElementById('factButton');

    function showRandomFact() {
      const randomIndex = Math.floor(Math.random() * facts.length);
      factElement.textContent = facts[randomIndex];
    }

    button.addEventListener('click', showRandomFact);
  </script>
</body>
</html>
